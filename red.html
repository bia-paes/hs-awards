<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello Sugar — Award Ticker (Red)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<style>
  body { margin: 0; padding: 40px 20px; background: #fff; font-family: 'Montserrat', sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem 0; background: #ED1845; border-radius: 12px; }
  .eyebrow { font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; text-align: center; margin: 0 0 1.25rem; }
  .marquee { position: relative; overflow: hidden; -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent); mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent); }
  .track { display: flex; gap: 16px; width: max-content; animation: hsScroll 70s linear infinite; }
  @keyframes hsScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee:hover .track { animation-play-state: paused; }
  .hs-badge { display: flex; align-items: center; gap: 10px; white-space: nowrap; flex-shrink: 0; padding: 10px 18px; border-radius: 999px; background: transparent; border: 1px solid rgba(255,255,255,0.45); opacity: 0.55; filter: saturate(0); transition: opacity 0.2s, filter 0.2s, border-color 0.2s, background 0.2s; }
  .hs-badge:hover { opacity: 1; filter: saturate(1); border-color: #fff; background: rgba(255,255,255,0.1); }
  .hs-badge .rank { display: flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; border-radius: 50%; background: #fff; color: #ED1845; font-weight: 700; font-size: 11px; flex-shrink: 0; }
  .hs-badge .ic { color: #F7DCDA; font-size: 16px; flex-shrink: 0; }
  .hs-badge .txt { display: flex; flex-direction: column; line-height: 1.25; }
  .hs-badge .src { font-weight: 600; font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #F7DCDA; }
  .hs-badge .lbl { font-weight: 500; font-size: 12.5px; color: #fff; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">As recognized by</p>
    <div class="marquee">
      <div class="track" id="track1"></div>
    </div>
  </div>

<script>
const awards = [
  { src: 'Entrepreneur', label: 'Franchise 500', rank: '#197', icon: 'ti-trophy' },
  { src: 'Entrepreneur', label: 'Top new & emerging franchises', rank: '#3', icon: 'ti-sparkles' },
  { src: 'Entrepreneur', label: 'Fastest growing franchises', rank: null, icon: 'ti-trending-up' },
  { src: 'Entrepreneur', label: 'Top 10 franchises under $100k', rank: '#10', icon: 'ti-coin' },
  { src: 'Entrepreneur', label: 'Top 10 franchises in every industry', rank: null, icon: 'ti-stars' },
  { src: 'Entrepreneur', label: 'Top brands for multi-unit owners', rank: null, icon: 'ti-building-store' },
  { src: 'EY', label: 'Entrepreneur of the year — Pacific SW regional winner & national finalist', rank: null, icon: 'ti-medal' },
  { src: 'Franchise Business Review', label: 'Most innovative franchise', rank: null, icon: 'ti-bulb' },
  { src: 'Franchise Business Review', label: 'Top franchises for women', rank: null, icon: 'ti-heart' },
  { src: 'Franchise Business Review', label: 'Franchisee satisfaction award', rank: null, icon: 'ti-thumb-up' }
];

function buildBadges(list) {
  return list.map(a => `
    <div class="hs-badge">
      ${a.rank ? `<span class="rank">${a.rank}</span>` : `<i class="ti ${a.icon} ic" aria-hidden="true"></i>`}
      <div class="txt">
        <span class="src">${a.src} 2026</span>
        <span class="lbl">${a.label}</span>
      </div>
    </div>`).join('');
}

document.getElementById('track1').innerHTML = buildBadges(awards) + buildBadges(awards);
</script>
</body>
</html>
